name: Java CI with Maven + Docker

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  IMAGE_NAME: java-maven-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package

    # 🔎 Debug what Maven produced
    - name: Show Generated Files
      run: |
        echo "===== TARGET FOLDER ====="
        ls -R target || echo "No target folder"

    # ✅ Upload whatever is generated (jar/war/etc)
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-build
        path: target/**
        if-no-files-found: error

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: app-build
        path: target/

    - name: Verify Downloaded Files
      run: ls -R target

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        FILE=$(find target -type f \( -name "*.jar" -o -name "*.war" \) | head -n 1)
        echo "Using file: $FILE"
        docker build --build-arg APP_FILE=$FILE \
          -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
